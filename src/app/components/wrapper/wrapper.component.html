<div class="shell-layout">
  <vc-navbar
    brandLabel="Vyra"
    brandAccent="Care"
    brandSubtitle="Gestao integrada para clinicas e profissionais de saude"
    [logoClickable]="true"
    [searchValue]="searchValue()"
    [notifications]="notifications"
    [profileName]="userDisplayName"
    profileRole="Administrador"
    [profileInitials]="userInitials"
    [profileActions]="profileActions"
    (searchChange)="handleSearchChange($event)"
    (searchSubmitted)="handleSearchSubmit($event)"
    (logoClicked)="navigateToRoot()"
    (profileActionSelected)="handleProfileAction($event)"
  ></vc-navbar>

  <div class="shell-body">
    <div class="shell-sidebar">
      <vc-sidebar
        [groups]="sidebarGroups"
        [activeItemId]="activeSidebarItemId"
        [support]="sidebarSupport"
        (itemSelected)="selectSidebarItem($event)"
      ></vc-sidebar>
    </div>

    <main class="shell-main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
