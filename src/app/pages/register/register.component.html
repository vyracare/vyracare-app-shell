<div class="page-wrapper">
  <div class="container">
    <div class="login-wrap">
      <div class="login-content">
        <div class="login-logo">
          <div class="brand-mark">Vyracare</div>
          <p>Crie sua conta e simplifique sua rotina de cuidado.</p>
        </div>

        <form class="login-form" [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <vc-input
              id="register-full-name"
              label="Nome completo"
              type="text"
              formControlName="fullName"
              placeholder="Digite seu nome"
              [error]="
                form.controls['fullName'].invalid && (form.controls['fullName'].dirty || form.controls['fullName'].touched)
                  ? 'Nome e obrigatorio'
                  : ''
              "
            ></vc-input>
          </div>

          <div class="form-group">
            <vc-input
              id="register-email"
              label="E-mail"
              type="email"
              mask="email"
              formControlName="email"
              placeholder="exemplo@vyracare.com"
              [error]="
                form.controls['email'].invalid && (form.controls['email'].dirty || form.controls['email'].touched)
                  ? (form.controls['email'].hasError('required') ? 'E-mail e obrigatorio' : 'Utilize um e-mail valido')
                  : ''
              "
            ></vc-input>
          </div>

          <div class="form-group">
            <vc-input
              id="register-password"
              label="Senha"
              type="password"
              mask="password"
              formControlName="password"
              placeholder="Crie uma senha"
              [error]="
                form.controls['password'].invalid && (form.controls['password'].dirty || form.controls['password'].touched)
                  ? (form.controls['password'].hasError('required') ? 'Senha e obrigatoria' : 'A senha precisa ter no minimo 6 caracteres')
                  : ''
              "
            ></vc-input>
          </div>

          <p class="info-text">A senha precisa ter pelo menos 6 caracteres.</p>

          <vc-button
            type="submit"
            full
            [loading]="loading"
            [disabled]="loading || form.invalid"
          >
            {{ loading ? 'Criando conta...' : 'Criar conta' }}
          </vc-button>
        </form>

        @if (error) {
          <div class="error-message">
            {{ error }}
          </div>
        }

        <div class="register-link">
          <p>Ja tem uma conta?</p>
          <vc-button type="button" variant="ghost" full (click)="goToLogin()">
            Acesse sua conta
          </vc-button>
        </div>
      </div>
    </div>
  </div>
</div>
