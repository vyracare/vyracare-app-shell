<div class="page-wrapper">
  <div class="container">
    <div class="login-wrap">
      <div class="login-content">
        <div class="login-logo">
          <div class="brand-mark">Vyracare</div>
          <p>Bem-vindo(a)! Acesse sua conta para continuar.</p>
        </div>

        <form class="login-form" [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <vc-input
              id="email"
              label="E-mail"
              type="email"
              mask="email"
              formControlName="email"
              placeholder="Digite seu e-mail"
              [error]="
                form.controls['email'].invalid && (form.controls['email'].dirty || form.controls['email'].touched)
                  ? (form.controls['email'].hasError('required') ? 'E-mail e obrigatorio' : 'E-mail invalido')
                  : ''
              "
            ></vc-input>
          </div>

          <div class="form-group">
            <vc-input
              id="password"
              label="Senha"
              type="password"
              mask="password"
              formControlName="password"
              placeholder="Digite sua senha"
              [error]="
                form.controls['password'].invalid && (form.controls['password'].dirty || form.controls['password'].touched)
                  ? 'Senha e obrigatoria'
                  : ''
              "
            ></vc-input>
          </div>

          <div class="form-helper">
            <span>Esqueceu a senha? <a routerLink="/forgot-password">Redefinir senha</a></span>
          </div>

          <vc-button
            type="submit"
            full
            [loading]="loading"
            [disabled]="loading || form.invalid"
          >
            {{ loading ? 'Entrando...' : 'Entrar' }}
          </vc-button>
        </form>

        @if (error) {
          <div class="error-message">
            {{ error }}
          </div>
        }

        <div class="register-link">
          <div class="register-actions">
            <div class="register-action">
              <p>Ainda nao tem uma conta?</p>
              <vc-button type="button" variant="ghost" full (click)="goToRegister()">
                Crie uma agora!
              </vc-button>
            </div>
            <div class="register-action">
              <p>Primeiro acesso?</p>
              <vc-button type="button" variant="ghost" full (click)="goToFirstAccess()">
                Definir senha
              </vc-button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
